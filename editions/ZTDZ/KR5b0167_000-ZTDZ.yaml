front:
  text: 金籙齋啓壇儀軆一
  hash: sha256:03112557fd5348eb08226a87b0e7b679308f5fe9ae4776ccf0c9ea6014c87f4d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0167_SJB_000-090067a, image: sjb/09/090067a.png}
body:
  text: 廣成先生杜光庭集序事太上有三元簡文普弘慈救幽明蒙澤生死荷恩上元金籙爲國主帝王鎭安社稷保祐生靈上消天灾下禳地禍制御劫運寧肅山川摧伏妖魔蕩除凶穢或五星失度四氣變常二象不寧兩曜孛蝕天傾地震川竭山崩水旱爲灾螟蝗害稼疫毒流布兵革四興猛鷙侵凌水火漂灼冬雷夏雪彗孛呈妖皆當於名山洞府古跡神郷精備信儀按遵科典修金籙寳齋拜天謝過責躬引咎思道祈靈可以禳却氛邪解銷灾變唯在精苦殫罄竭節輸誠可𦤺通感爾經云靈寳大乗普度天人福逮一切存殁獲恩皇丈大字通神降靈三洞寳經自然天文並是度身升玄之法修之者馳騁龍駕白日登晨奉之者身脫八難免諸苦厄七祖生天見之者精心信向世生善縁若修齋行道明依具格立感上玄科禁法式列之如左金籙壇外壇廣四丈五尺髙二尺中壇廣三丈三尺髙二尺内壇廣二丈四尺髙二尺方壇共髙六尺法坤之數也都壇開十門用長纂十二枚短纂八枚中壇長纂十八枚短纂八枚八卦纂八枚别於壇外四角四正位安之合用長纂三十八枚各長一丈出土九尺短纂三十枚各長七尺出土六尺三壇用纂六十八枚纂各圍八寸長者染漆黒白各五處短者黒白各三處作纂法用墨二挺先墨後漆用漆十斤用芒一百五十把打爲縛纂令細麤紙百幅纒竹下墨及漆竹用爲纂無竹之郷可用木作之大七寸圍長者朱漆五處墨漆五處短者朱漆三處墨漆三處纂頭刻爲蓮花獅子龍鶴神獸之形五色裝飾也縛纂用絳繩七十五丈四尺七寸七分於壇上雨重竹纂勿門用榜二十二枚各廣三寸二分長七寸四分用二寸釘一百四十二枚釘榜銅䥫竹釘随時所作用三寸釘二十二枚釘榜著門檐及封纂亥爲天門墨書青榜巳爲地戸赤書黄榜寅爲日門青書朱榜申爲月門白書黑榜右四門施於外壇東方青華元陽門朱書青榜南方洞陽太光門黄書赤榜西方通隂金闕門墨書白榜北方隂生廣靈門青書黑榜東北通靈禁上門白書黄榜東南始陽生元門白書黄榜西南元黄髙晨門白書黄榜西北九仙梵行門白書黄榜上方大羅飛梵門青書黒榜亥地下方九靈皇眞門黄書赤榜巳地右十門施於内壇震宫洞青乏炁青書黄榜卯地离宫洞陽之炁朱書曰榜午地兌宫少隂之炁白書青榜酉地坎宫洞隂之炁黑書赤榜子地巽宫梵行之炁黄書黒榜東南角坤宫梵陽之炁黄書黒榜西南角乾宫梵通之炁黄書黒榜西北角艮宫梵元之炁黄書黒榜東北角右八卦榜施於都壇之分合二十二榜又用朱二兩赤土三升染芒縁青一兩半胡粉十兩黄丹一兩墨三丸漆五筆五管外壇四尺薦席十六具淨褥羶自制中壇五尺薦席十二具浄氊褥自制又須長筵狹席繞都壇外一周又於壇内中央安一髙座請經又用一案次髙座南請香火又用案五枚著四面四門及中央又經堂内須三案香火三具又用青𥿄五幅朱書五方眞文置五方案上眞文本岀玉訣上卷又用金龍五枚鎭五方真文上又用香五鑪并五奩置案頭又壇上合用案七張鑪奩七具又用漆合五枚盛五方紋繒著五方香案下又用一案置齋主本命紋繒在三寳座前左邊然燈法春則然九燈亦可九十燈亦可九百燈夏則然三燈亦可三十燈亦可三百燈秋則然七燈亦可七十燈亦可七百燈冬則然五燈亦可五十燈亦可五百燈曰平之月則然十二燈亦可百二十燈亦可千二百燈右件燈一依經法但先師相承指方别九燈四九三十六燈在壇外羅列今冝依經貴賤時節量之也又須安一長燈長一丈九尺出土上然九燈安内壇裏近三寳座西北上以照九幽長夜之府又於中庭安一百五十六燈又須蠟燭夜别七條凡禳灾度厄用五色紋繒天子疋數諸王公丈數庶人綬繒尺數東方青紋九南方絳紋三西方白紋七北方皂紋五中央黄紋十二公侯本命一年加一丈隨命色又須本命之日天子紫紋之繒年别一疋諸侯亦紫紋之繒年别一丈庶人綬繒年别一尺錢二萬四千亦一萬二千亦二千四百米一十二斛亦二石四斗油一百二十斤亦一十二斤又須金龍五枚枚重一兩天子用上金諸王公用次金庶人用下金事訖投於山水夫行道人若依太眞儀天子須二十八人諸王公十六人庶人十四人所以然者爲道心者稀難堪福田若有精進之士至多亦冝貴賤量乏假令十四人三日行道用和香四升香炭丸三百枚生綵五色花三升用合子盛之誦詠訖分散之手巾四枚懸齋堂前又須香湯人别一斛浴巾二枚懸室前厠令淨宻不得敞露齋竟須黄素五尺書表夫行道日數經云春九日秋七日夏三日冬五日四季之日十二日又云多少目適人所爲至於三日三夜苦請丹心亦感於諸夫深自可量節而行事齋竟投龍及施散法物依經文右件法用所須若有所闕考屬諸經有明科不可輕闕齋日限滿依别法言功竟燒眞文三日外拜表謝恩竟方落榜毀壇纂都畢宿啓儀安施旣訖尊卑相次預皆沐浴薫香新潔法服簡履壇座一一如法列玄師之前條䟽職品各司所任都講鳴磬告衆中外肅然齋主投詞或大臣爲國或帝王降命皆有代拜臣寮埲函投詞師受詞關告一如常儀次三皈依頌次華夏讃次請三師讃次旋行至地戸禁壇次入戸呪次升中壇天門次上五方香晝東夜比次上御案香次上香宻呪次上本位香次各禮師存念如法存思如靈寳儀次鳴法鼓二十四通次發鑪各稱法位具法位奉行金籙大齋法事臣某等今故燒香奉爲社稷尊靈宗祧先聖皇帝皇后皇太子諸王公主中外臣寮天下人民蝖飛蠢動歸身歸神歸命大道十方無極太上靈寳天尊普願天清地靜日月貞明萬國咸和羣生昭泰九幽寜息長夜開光身得道眞超凌三界逍遥無上金闕七寳紫微官求與道合所啓玄感上御至眞無極道前次禮十方從比爲始次長跪懴悔臣衆等至心歸身歸神歸命十方無極太上靈寳天尊以今啓齋禮懴懴悔宗廟尊靈今皇帝皇后皇太子諸王公主文武職寮自從曠劫以來至于今日身心口業無量無邊因今初夜升壇吿齋朝懴罪無巨細咸乞蕩除上願宗廟安寜帝圖遐逺聖躬萬夀四海和平率土普天俱登夀域幽明受福蠢動霑榮三業清夷六情恬晏同升福岸俱契道眞至心稽首正眞三寳次三啓頌次三禮次旋行讀五方眞文從東方始訖於中方還本位上香重稱法位號其眞文如降誕節即用第一節如爲星宿灾變用第二節如爲鬼神疾疫用第三節如爲水灾淫雨用第四節一如玉訣中告齋之時止讀眞文未用都呪都呪散壇用爾衆官隨聲呪東方眞文東方丸炁始皇青天碧霞鬱壘中有老人總校圖録攝氣舉仙南方眞文南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三炁勃光神仙受命應運太陽西方眞文西方素天白帝七門金靈皓映太華流氛白石峩峩七炁氤氲上有始生皇老大神總領肺氣主校九天檢定圖録制召上仙北方眞文北方玄天五炁徘徊中有黒帝𩀱皇太微總領符命仙鍊八威青裙羽䙱龍文鳯衣上帝所舉制到玉階中央眞文中央總靈皇上天元始生五老中黄髙尊攝炁監眞總領羣生典録玄圖宿簡玉文催運輔氣普吿萬神重稱法位髙功具法位奉行金籙大齋法事某嶽先生某帝眞人臣某等謹重上啓太上無極大道太上大道君太上老君無上玄老十方靈寳天尊已得道大聖衆至眞諸君丈人三十六部尊經玄中大法師天師君上相上宰四司五帝三界官屬一切眞靈臣等伏聞大道開光三乗御運上聖垂化三籙懸科佐世安人濟時行教保寜邦國匡祐帝王凡有辤誠理冝關奏况奉詞㫖敢不上聞次讀詞皇帝宿荷神休誕膺景運繼天立極纂聖御時期暢玄風以康黎獻尚慮生靈未泰德教未孚或賞罰乖冝刑法失度或隂陽舛繆氣序愆調唯罄丹誠上祈玄感竊惟乾坤主宰造化職司三界眞靈諸天曹屬舉善徹惡定罪紀功幽顯無遺洪纎攸繫列言奏簡上御玄都天尊埀鑒祐之慈衆聖降昭彰之澤影隨響荅有感必通是用虔設壇場精修齋直凝神滌慮攺操革情依上元金籙簡文明眞科品於某處某宫觀奉爲皇帝依威儀舊典置立皇壇四界八極法天象地披九光寳藴敷顯眞文招眞降靈以祈所願謹齎金龍玉璧紋綵命繒油燭香花事事如法燒香行道披心露形然燈續明照燭幽夜臣等謹依齋法宿以啓聞恩惟太上三尊十方衆聖無上經寳玄中大法師靈寳至眞三界官屬埀神鑒映省覽所陳乞敕勒監察曹屬侍經威神土地眞官一合同心併力營衛掃蕩内外清淨壇場降伏妖魔馘滅精祟使臣等心安神定思念立感啓奏上逹齋功成就無有窒礙臣等雖佩至眞叅修大法處身五濁染跡六塵三關未調六情放蕩仰頼禁戒以檢身心輒依齋科說戒威儀使同齋之人咸遵法訓須明旦晨曉依法行道續更啓聞謹啓次智慧頌三首旋行至東方各一拜次唱人各首體投地心禮十方方各一拜從北爲始次云禮足衆官平跪說戒威儀次說戒次十二願次復鑪金籙齋啓壇儀
